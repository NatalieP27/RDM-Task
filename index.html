<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDM Decision Task</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #experiment-container { text-align: center; max-width: 600px; padding: 20px; }
        canvas { background: black; border: 2px solid #444; cursor: crosshair; }
        .hidden { display: none; }
        #timer { font-size: 24px; color: #ff4444; margin-bottom: 10px; font-family: monospace; }
        button { padding: 12px 24px; font-size: 18px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #666; }
        input { padding: 10px; font-size: 16px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
    </style>
</head>
<body>

    <div id="experiment-container">
        <div id="welcome-screen">
            <h1>Motion Perception Task</h1>
            <p id="welcome-text">Please enter your initials to begin.</p>
            <div id="input-area">
                <input type="text" id="participant-id" placeholder="Initials">
                <br>
                <button onclick="assignCondition()">Next</button>
            </div>
        </div>

        <div id="instructions-screen" class="hidden">
            <h1 id="instr-title">Instructions</h1>
            <p id="instruction-content" style="line-height: 1.6; text-align: left;"></p>
            <button onclick="startTask()">Start Task</button>
        </div>

        <div id="task-screen" class="hidden">
            <div id="timer" class="hidden">Time: <span id="time-val">0.00</span>s</div>
            <div id="instruction-header" style="margin-bottom:10px; font-weight: bold;"></div>
            <canvas id="rdmCanvas" width="500" height="400"></canvas>
        </div>

        <div id="results-screen" class="hidden">
            <h2>Task Complete</h2>
            <p>Processing results...</p>
            <canvas id="resultsChart" width="400" height="300"></canvas>
        </div>
    </div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxa-Bex68Oe-Uj1b_zTjOFuY064iaW6X4x5aycuwvvAf2QFGbk9_0DQ_UonURL6CBNinQ/exec";
    
    let participantID, condition;
    let currentTrial = 0;
    const totalTrials = 10;
    let trialData = [];
    let startTime, timerInterval, animationId;
    let availableConditions = []; 

    const canvas = document.getElementById('rdmCanvas');
    const ctx = canvas.getContext('2d');
    let dots = [];
    const numDots = 500;
    const coherence = 0.05; 
    const signalSpeed = 10;
    const noiseSpeedMultiplier = 10;

    // Load conditions from GSHEET
    async function checkAvailability() {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            if (data.full) {
                document.getElementById('welcome-text').innerText = "Capacity reached. Thank you!";
                document.getElementById('input-area').classList.add('hidden');
            } else {
                availableConditions = data.availableConditions;
            }
        } catch (e) {
            availableConditions = ['Control', 'Implicit', 'Explicit'];
        }
    }
    checkAvailability();

    // Logic to show the new Instructions Screen
    function assignCondition() {
        participantID = document.getElementById('participant-id').value || "User_" + Math.random().toString(36).substr(2, 5);
        
        if (availableConditions.length === 0) {
            alert("Still loading settings... try again in a second.");
            return;
        }

        // Randomly assign condition from available pool
        condition = availableConditions[Math.floor(Math.random() * availableConditions.length)];
        console.log("Assigned Condition:", condition); // Check your console (F12) to see this

        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('instructions-screen').classList.remove('hidden');

        // Text setup
        const standardText = "You'll see a cloud of moving dots. Some dots move coherently LEFT or RIGHT, while others move randomly. Your job is to decide which direction the coherent dots are moving.<br><br>• Press tap the button to start<br>• Press ←/→ buttons to respond.";
        const speedText = "<br><strong>Respond as quickly and accurately as possible.</strong>";

        if (condition === 'Explicit') {
            document.getElementById('instruction-content').innerHTML = standardText + speedText;
        } else {
            // Control and Implicit use the standard text
            document.getElementById('instruction-content').innerHTML = standardText;
        }
    }

    // Move from instructions to dots
    function startTask() {
        document.getElementById('instructions-screen').classList.add('hidden');
        document.getElementById('task-screen').classList.remove('hidden');

        const header = document.getElementById('instruction-header');
        
        if (condition !== 'Control') {
            document.getElementById('timer').classList.remove('hidden');
        }
        
        if (condition === 'Explicit') {
            header.innerText = "RESPOND AS FAST AS POSSIBLE!";
            header.style.color = "yellow";
        } else {
            header.innerText = "Use Left/Right arrow keys to respond.";
            header.style.color = "white";
        }

        initTrial();
    }

    function initTrial() {
        if (currentTrial >= totalTrials) return endExperiment();
        let targetDirection = Math.random() > 0.5 ? 1 : -1;
        dots = [];
        for (let i = 0; i < numDots; i++) {
            dots.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * noiseSpeedMultiplier,
                vy: (Math.random() - 0.5) * noiseSpeedMultiplier,
                isCoherent: Math.random() < coherence
            });
        }
        
        startTime = performance.now();
        if (condition !== 'Control') startTimerUI();
        
        const handleResponse = (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                const rt = performance.now() - startTime;
                const responseDir = e.key === 'ArrowRight' ? 1 : -1;
                window.removeEventListener('keydown', handleResponse);
                cancelAnimationFrame(animationId);
                clearInterval(timerInterval);
                
                trialData.push({
                    Participant_ID: participantID,
                    Condition: condition,
                    Trial_Number: currentTrial + 1,
                    Reaction_Time: Math.round(rt),
                    Accuracy: responseDir === targetDirection ? 1 : 0
                });
                
                currentTrial++;
                setTimeout(initTrial, 500); 
            }
        };

        animate(targetDirection);
        window.addEventListener('keydown', handleResponse);
    }

    function animate(dir) {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        dots.forEach(dot => {
            if (dot.isCoherent) dot.x += (dir * signalSpeed);
            else { dot.x += dot.vx; dot.y += dot.vy; }
            if (dot.x > canvas.width) dot.x = 0;
            if (dot.x < 0) dot.x = canvas.width;
            if (dot.y > canvas.height) dot.y = 0;
            if (dot.y < 0) dot.y = canvas.height;
            ctx.beginPath();
            ctx.arc(dot.x, dot.y, 2, 0, Math.PI * 2);
            ctx.fill();
        });
        animationId = requestAnimationFrame(() => animate(dir));
    }

    function startTimerUI() {
        const timeBox = document.getElementById('time-val');
        timerInterval = setInterval(() => {
            timeBox.innerText = ((performance.now() - startTime) / 1000).toFixed(2);
        }, 50);
    }

    async function endExperiment() {
        document.getElementById('task-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(trialData)
            });
        } catch (e) {}

        setTimeout(async () => {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                plotResults(data.history || []);
            } catch (err) { plotResults([]); }
        }, 1000);
    }

    function plotResults(history) {
        const userAvg = trialData.reduce((a, b) => a + b.Reaction_Time, 0) / trialData.length;
        let globalAvg = history.length > 0 ? history.reduce((a, b) => a + Number(b), 0) / history.length : userAvg;
        const ctxChart = document.getElementById('resultsChart').getContext('2d');
        new Chart(ctxChart, {
            type: 'bar',
            data: {
                labels: ['You', 'Global Avg'],
                datasets: [{ label: 'RT (ms)', data: [userAvg, globalAvg], backgroundColor: ['#44bbff', '#ff4444'] }]
            }
        });
        document.querySelector('#results-screen p').innerText = "Data Saved!";
    }
</script>
</body>
</html>
